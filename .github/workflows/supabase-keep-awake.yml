name: Supabase Keep Awake

on:
  schedule:
    # Every 6th day (UTC). Keeps free-tier project active.
    - cron: "0 3 */6 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  keep-awake:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate connection secret
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_DB_URL:-}" ]; then
            echo "SUPABASE_DB_URL is not set. Add it in repository secrets."
            exit 1
          fi

      - name: Ensure psql is available
        run: |
          set -euo pipefail
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Ping Supabase database
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          # Verifies an actual DB round-trip to avoid free-tier inactivity pause.
          psql "${SUPABASE_DB_URL}" -v ON_ERROR_STOP=1 -c "SELECT 1;"

      - name: Verification hint
        run: |
          echo "Keep-awake query completed. Use workflow_dispatch anytime to test manually."
