name: Supabase Keep Awake

on:
  schedule:
    # Daily at 03:00 UTC. Keeps free-tier project active (7-day inactivity threshold).
    # Running daily provides margin for GitHub Actions delays/skips.
    - cron: "0 3 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  keep-awake:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "SUPABASE_URL and SUPABASE_ANON_KEY must be set in repository secrets."
            exit 1
          fi
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "::warning::SUPABASE_SERVICE_ROLE_KEY not set; DB write ping will be skipped."
          fi

      - name: Ping Supabase REST API (read)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/accounts?select=puuid&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "REST API read ping responded with HTTP ${HTTP_STATUS}"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Unexpected status code from Supabase REST API"
            exit 1
          fi

      - name: Write to keepalive table (database mutation)
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "Skipping DB write ping (no service role key)."
            exit 0
          fi
          # Upsert a row into the keepalive table to register a real DB write.
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/keepalive" \
            -X POST \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: resolution=merge-duplicates" \
            -d '{"id": 1, "pinged_at": "'"$(date -u +%Y-%m-%dT%H:%M:%SZ)"'"}')
          echo "Keepalive write responded with HTTP ${HTTP_STATUS}"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "::warning::Keepalive write failed with HTTP ${HTTP_STATUS}"
          fi

      - name: Ping Supabase database (direct write)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          if [ -n "${SUPABASE_DB_URL:-}" ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
            psql "${SUPABASE_DB_URL}" -v ON_ERROR_STOP=1 -c \
              "INSERT INTO public.keepalive (id, pinged_at) VALUES (1, now())
               ON CONFLICT (id) DO UPDATE SET pinged_at = now();"
            echo "Direct DB write ping succeeded."
          else
            echo "SUPABASE_DB_URL not set, skipping direct DB ping."
          fi

      - name: Done
        run: echo "Keep-awake pings completed. Use workflow_dispatch to test manually."
