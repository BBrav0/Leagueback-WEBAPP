name: Supabase Keep Awake

on:
  schedule:
    # Every 3 days (UTC). Keeps free-tier project active (7-day inactivity threshold).
    - cron: "0 3 */3 * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  keep-awake:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Validate secrets
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ]; then
            echo "SUPABASE_URL and SUPABASE_ANON_KEY must be set in repository secrets."
            exit 1
          fi

      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          set -euo pipefail
          # Hit the REST API so Supabase registers project activity.
          HTTP_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/accounts?select=puuid&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")
          echo "REST API responded with HTTP ${HTTP_STATUS}"
          if [ "$HTTP_STATUS" -lt 200 ] || [ "$HTTP_STATUS" -ge 300 ]; then
            echo "Unexpected status code from Supabase REST API"
            exit 1
          fi

      - name: Ping Supabase database (direct)
        env:
          SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
        run: |
          set -euo pipefail
          if [ -n "${SUPABASE_DB_URL:-}" ]; then
            sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
            psql "${SUPABASE_DB_URL}" -v ON_ERROR_STOP=1 -c "SELECT 1;"
            echo "Direct DB ping succeeded."
          else
            echo "SUPABASE_DB_URL not set, skipping direct DB ping."
          fi

      - name: Done
        run: echo "Keep-awake pings completed. Use workflow_dispatch to test manually."
