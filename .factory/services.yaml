commands:
  install: pnpm install --frozen-lockfile
  lint: pnpm run lint
  static-check: pnpm run static-check
  typecheck: pnpm run typecheck
  test: pnpm test
  build: pnpm run build

services:
  web:
    start: powershell -NoProfile -Command "pnpm run dev"
    stop: cmd /c "for /f \"tokens=5\" %a in ('netstat -ano ^| findstr :3005 ^| findstr LISTENING') do taskkill /F /PID %a"
    healthcheck: curl -sf http://127.0.0.1:3005
    port: 3005
    depends_on: []
